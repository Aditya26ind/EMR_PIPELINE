services:
  cloudera:
    image: loganseo/cloudera-quickstart-docker:cdh6.3.2
    platform: linux/amd64
    hostname: quickstart.cloudera
    container_name: cloudera-quickstart
    privileged: true        # Required by the base image to start system services.
    ports:
      - "8888:8888"   # Hue UI
      - "7180:7180"   # Cloudera Manager (if started)
      - "21050:21050" # Impala JDBC/ODBC
      - "8020:8020"   # HDFS NameNode
      - "50070:50070" # NameNode Web UI
      - "50075:50075" # DataNode Web UI
      - "10000:10000" # HiveServer2
    environment:
      HOSTNAME: quickstart.cloudera
    volumes:
      - cloudera-data:/var/lib/hadoop-hdfs
    command: ["/usr/bin/docker-quickstart"]

volumes:
  cloudera-data:
    driver: local
